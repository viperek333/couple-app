<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="💑 Наши финансы" />
  <title>Наши финансы</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0d0d14; overscroll-behavior: none; }
    #root { min-height: 100vh; }

    /* Custom range slider */
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 4px; background: #2a2a40; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #a78bfa; cursor: pointer; box-shadow: 0 0 0 3px #1a1a2b; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #252538; border-radius: 4px; }

    /* Storage API shim using localStorage */
    .toast-enter { animation: slideUp .25s ease; }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Storage shim using localStorage (works offline on phone)
    window.storage = {
      get: async (key) => {
        const v = localStorage.getItem('shared_' + key);
        return v ? { key, value: v } : null;
      },
      set: async (key, value) => {
        localStorage.setItem('shared_' + key, value);
        return { key, value };
      },
      delete: async (key) => {
        localStorage.removeItem('shared_' + key);
        return { key, deleted: true };
      },
      list: async (prefix) => {
        const keys = Object.keys(localStorage)
          .filter(k => k.startsWith('shared_' + (prefix || '')))
          .map(k => k.replace('shared_', ''));
        return { keys };
      }
    };
  </script>

  <script type="text/babel" src="couple-app.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CoupleApp />);
  </script>
</body>
</html>
